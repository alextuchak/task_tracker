# docs/ генерируется swag'ом и сверяется в CI байт-в-байт — фиксерам туда нельзя
exclude: ^docs/

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-yaml

  - repo: local
    hooks:
      - id: golangci-lint-fmt
        name: golangci-lint fmt
        entry: golangci-lint fmt
        language: system
        types: [go]
        pass_filenames: false

      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run
        language: system
        types: [go]
        pass_filenames: false

      - id: go-mod-tidy
        name: go mod tidy -diff
        entry: go mod tidy -diff
        language: system
        files: (go\.(mod|sum)$|\.go$)
        pass_filenames: false

      - id: go-test
        name: go test (unit)
        entry: go test -short ./...
        language: system
        types: [go]
        pass_filenames: false
