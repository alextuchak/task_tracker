services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-tasks}
      MYSQL_USER: ${MYSQL_USER:-tasks}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-tasks}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 2s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30

  migrator:
    build:
      context: .
      target: migrator
    environment:
      GOOSE_DRIVER: ${GOOSE_DRIVER:-mysql}
      GOOSE_DBSTRING: ${GOOSE_DBSTRING:-tasks:tasks@tcp(mysql:3306)/tasks?parseTime=true}
    depends_on:
      mysql:
        condition: service_healthy

  app:
    build: .
    environment:
      ENV: ${ENV:-develop}
      APP_VERSION: ${APP_VERSION:-dev}
      CONFIG_PATH: ${CONFIG_PATH:-/config.yaml}
    volumes:
      - ./config.yaml:/config.yaml:ro
    ports:
      - "8080:8080"
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/readyz"]
      interval: 5s
      timeout: 3s
      retries: 10

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./deploy/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - app

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  mysql_data:
