version: '3'

env:
  GOTOOLCHAIN: auto

vars:
  GOOSE_DSN: '"tasks:tasks@tcp(localhost:3306)/tasks?parseTime=true"'
  DOCKER_SOCK:
    sh: sh -c 'echo "${DOCKER_HOST:-$(docker context inspect -f "{{"{{"}}.Endpoints.docker.Host{{"}}"}}" 2>/dev/null)}"'

tasks:
  build:
    cmds:
      - mkdir -p bin
      - go build -o bin/task-tracker cmd/api/main.go
  run:
    deps: [build]
    cmds:
      - ./bin/task-tracker
  install-lint:
    cmds:
      - which golangci-lint || curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b $(go env GOPATH)/bin
    desc: "Install golangci-lint if not present"
  lint:
    deps: [install-lint]
    cmds:
      - golangci-lint run ./...
    desc: "Run linters"
  fmt:
    cmds:
      - golangci-lint fmt
    desc: "Format code (gofumpt + goimports)"
  test:
    env:
      DOCKER_HOST: '{{.DOCKER_SOCK}}'
    cmds:
      - go test -race -count=1 ./...
    desc: "Run all tests including integration (needs docker)"
  test-unit:
    cmds:
      - go test -race -short ./...
    desc: "Run unit tests only, integration skipped"
  cover:
    env:
      DOCKER_HOST: '{{.DOCKER_SOCK}}'
    cmds:
      - go test -race -count=1 -coverprofile=coverage.out -coverpkg=./internal/... ./...
      - go tool cover -func=coverage.out | tail -1
      - go tool cover -html=coverage.out -o coverage.html
    desc: "Coverage across all tests incl. integration (needs docker)"

  up:
    cmds:
      - docker compose up -d --build
    desc: "Build and start the full stack (mysql, redis, migrator, app)"
  down:
    cmds:
      - docker compose down
    desc: "Stop the stack"

  migrate-new:
    cmds:
      - goose -dir migrations create {{.name}} sql
    desc: "Create a new migration: task migrate-new name=add_something"
  migrate-up:
    cmds:
      - goose -dir migrations mysql {{.GOOSE_DSN}} up
    desc: "Apply migrations to local mysql"
  migrate-status:
    cmds:
      - goose -dir migrations mysql {{.GOOSE_DSN}} status
    desc: "Show migration status"

  install-swag:
    cmds:
      - which swag || go install github.com/swaggo/swag/cmd/swag@v1.16.6
    desc: "Install swag CLI if not present"
  swagger:
    deps: [install-swag]
    cmds:
      - swag init -g cmd/api/main.go -o docs --outputTypes go,json --parseDependency --parseInternal
    desc: "Regenerate swagger spec from handler annotations"

  loadgen:
    cmds:
      - go run ./cmd/loadgen
    desc: "Demo traffic: 600 users under the per-user rate limit, ~900 rps for 3m (needs running stack)"

  pre-commit-install:
    cmds:
      - which pre-commit || pipx install pre-commit || brew install pre-commit
      - pre-commit install
    desc: "Install pre-commit and set up the git hook"
  pre-commit:
    cmds:
      - pre-commit run --all-files
    desc: "Run all pre-commit hooks on the whole repo"

  check:
    deps: [fmt, lint]
    desc: "Format and lint"
